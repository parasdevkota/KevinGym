name: Backend cicd workflow

on:
  push:
    branches:
      - main
      - development/kevinbai
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --prefix backend

      - name: Run tests
        run: npm test --prefix backend

  deploy:
    needs: build
    runs-on: self-hosted
    if: github.event_name == 'push'

    steps:
      - name: Deploy
        env:
          CI: false
        run: |
          cd ~/kevingym
          git fetch origin
          git reset --hard origin/${{ github.ref_name }}
          npm run install-all
          npm run build --prefix frontend
          pm2 restart kevingym
